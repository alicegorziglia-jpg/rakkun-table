name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # También podés buildear manualmente desde la UI de GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permisos a gradlew
        run: chmod +x android/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GraphicTablet-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Opcional: crear un Release automático cuando tagueás ──────────────────
      - name: Create Release (solo en tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: GraphicTablet ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
